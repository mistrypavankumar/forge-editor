      - properties
      - gradle
      - dockerfile
      - makefile
      - cmake
      - tf
      - tfvars
      - csv
      - tsv

# electron-vite emits the runnable app into out/; production dependencies
# (node-pty, typescript) are collected automatically from package.json.
files:
  - out/**
  - package.json

# The in-process TS language service (src/main/language) loads typescript's own
# lib.*.d.ts at runtime as the standard library. electron-builder strips *.d.ts from
# node_modules when collecting deps, so those files never make it into the asar — and
# without them every global type (Array, TemplateStringsArray, …) is undefined and
# IntelliSense reports bogus errors (e.g. gql`` tagged templates fail with TS2345).
# extraResources is copied verbatim (no .d.ts filtering), so ship the lib files here;
# project-service.ts resolves them from Contents/Resources/ts-libs at runtime.
extraResources:
  - from: node_modules/typescript/lib
    to: ts-libs
    filter:
      - 'lib*.d.ts'

# node-pty ships a native .node binary that cannot run from inside the asar.
# tsx (+ its esbuild dependency, which carries a native binary) is the loader the step debugger
# passes to a spawned `node` via --import so it can run TS/TSX debuggees. That plain `node` can't
# read inside app.asar, so the loader and its deps must live unpacked on disk; node-debug-session
# rewrites the resolved path from app.asar to app.asar.unpacked to match.
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/tsx/**'
  - '**/node_modules/esbuild/**'

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64
  # Personal/unsigned build — skip code signing so packaging never needs a cert.
  identity: null
  # Catch-all so Forge appears in "Open With" for ANY file, not just the extensions declared in
  # fileAssociations above. public.data matches every file (raw byte stream); public.content +
  # public.text broaden the match for documents. role: Editor + LSHandlerRank: Alternate offers
  # Forge as an option without making it the default handler for these broad types. Without code
  # signing macOS only honors this after the app is registered (run it once / it's in /Applications).
  # electron-builder concatenates this with the fileAssociations-derived CFBundleDocumentTypes.
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: All Files
        CFBundleTypeRole: Editor
        LSHandlerRank: Alternate
        LSItemContentTypes:
          - public.data
          - public.content
          - public.text

dmg:
  title: Forge

win:
  icon: build/icon.png
  target:
    - nsis

linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
