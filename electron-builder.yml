appId: com.pavankumar.forge
productName: Forge
copyright: Copyright © Pavankumar Mistry

directories:
  buildResources: build
  output: dist

# Register Forge as a handler for common code/text files so it appears in the OS "Open With"
# menu (and can be set as the default editor). role: Editor + rank: Alternate means we offer to
# open these files without seizing ownership from a user's existing default app. Files arriving
# this way are delivered to the running app via the main-process `open-file` handler.
fileAssociations:
  - name: Source Code
    role: Editor
    rank: Alternate
    ext:
      - txt
      - text
      - log
      - md
      - markdown
      - mdx
      - rst
      - adoc
      - js
      - jsx
      - mjs
      - cjs
      - ts
      - tsx
      - mts
      - cts
      - json
      - jsonc
      - json5
      - html
      - htm
      - xml
      - svg
      - vue
      - svelte
      - astro
      - css
      - scss
      - sass
      - less
      - styl
      - py
      - pyw
      - rb
      - php
      - go
      - rs
      - java
      - kt
      - kts
      - scala
      - groovy
      - c
      - h
      - cc
      - cpp
      - cxx
      - hpp
      - hh
      - hxx
      - m
      - mm
      - cs
      - swift
      - dart
      - lua
      - pl
      - pm
      - r
      - jl
      - ex
      - exs
      - erl
      - hs
      - clj
      - cljs
      - sh
      - bash
      - zsh
      - fish
      - ps1
